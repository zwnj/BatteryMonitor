name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart('v')
          } else {
            $version = "${{ inputs.version }}"
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore dependencies
        run: dotnet restore BatteryMonitor3.csproj

      - name: Publish application
        run: dotnet publish BatteryMonitor3.csproj -c Release -r win-x64 --self-contained false -o publish

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Download latest release for delta generation
        shell: pwsh
        continue-on-error: true
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}

      - name: Pack release
        shell: pwsh
        run: vpk pack -u BatteryMonitor3 -v ${{ steps.version.outputs.version }} -p publish

      - name: Upload release to GitHub Releases
        shell: pwsh
        run: vpk upload github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --publish --releaseName "BatteryMonitor3 ${{ steps.version.outputs.version }}" --tag v${{ steps.version.outputs.version }}
