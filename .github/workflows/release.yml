name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v. Leave empty to auto-bump the patch version from the latest release."
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine release version
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const requestedVersion = `${{ inputs.version || '' }}`.trim();
            const ref = `${context.ref || ''}`;

            if (context.eventName === 'push' && ref.startsWith('refs/tags/')) {
              const version = ref.replace(/^refs\/tags\/v?/i, '');
              core.setOutput('version', version);
              core.info(`Using tag version ${version}`);
              return;
            }

            if (requestedVersion) {
              core.setOutput('version', requestedVersion);
              core.info(`Using requested version ${requestedVersion}`);
              return;
            }

            try {
              const { data: release } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              const latestTag = release.tag_name ?? '';
              const match = latestTag.match(/^v?(\d+)\.(\d+)\.(\d+)$/);
              if (!match) {
                throw new Error(`Latest release tag "${latestTag}" is not a semantic version`);
              }

              const major = Number(match[1]);
              const minor = Number(match[2]);
              const patch = Number(match[3]);
              const version = `${major}.${minor}.${patch + 1}`;

              core.setOutput('version', version);
              core.info(`Auto-bumped version from ${latestTag} to ${version}`);
            } catch (error) {
              if (error?.status === 404) {
                const version = "1.0.2";
                core.setOutput('version', version);
                core.info(`No published release found. Falling back to ${version}`);
                return;
              }

              throw error;
            }

      - name: Restore dependencies
        run: dotnet restore BatteryMonitor.csproj

      - name: Publish application
        run: dotnet publish BatteryMonitor.csproj -c Release -r win-x64 --self-contained false -o publish -p:Version=${{ steps.version.outputs.version }} -p:AssemblyVersion=${{ steps.version.outputs.version }}.0 -p:FileVersion=${{ steps.version.outputs.version }}.0 -p:InformationalVersion=${{ steps.version.outputs.version }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Download latest release for delta generation
        shell: pwsh
        continue-on-error: true
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}

      - name: Pack release
        shell: pwsh
        run: vpk pack -u BatteryMonitor -v ${{ steps.version.outputs.version }} -p publish

      - name: Upload release to GitHub Releases
        shell: pwsh
        run: vpk upload github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --publish --releaseName "BatteryMonitor ${{ steps.version.outputs.version }}" --tag v${{ steps.version.outputs.version }}
