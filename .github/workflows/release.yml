name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish win-x64 release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "8.0.x"

      - name: Validate release tag
        id: version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
              throw "Release tag must use vMAJOR.MINOR.PATCH: $tag"
          }

          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "version=$($Matches.version)" -Encoding UTF8

      - name: Verify source
        shell: pwsh
        run: |
          dotnet restore BatteryMonitor.sln
          dotnet build BatteryMonitor.sln --configuration Release --no-restore
          dotnet test BatteryMonitor.sln --configuration Release --no-build --no-restore

      - name: Restore Velopack tool
        shell: pwsh
        run: dotnet tool restore

      - name: Download previous Velopack release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dotnet vpk download github `
              --repoUrl "https://github.com/${{ github.repository }}" `
              --token $env:GH_TOKEN `
              --outputDir artifacts/release

      - name: Package application
        shell: pwsh
        run: ./scripts/package.ps1 -Version '${{ steps.version.outputs.version }}' -KeepReleaseDirectory

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: BatteryMonitor-${{ steps.version.outputs.version }}-win-x64
          path: artifacts/release
          if-no-files-found: error
          retention-days: 14

      - name: Attest installer and portable archive
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/release/*-Setup.exe
            artifacts/release/*-Portable.zip

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          dotnet vpk upload github `
              --repoUrl "https://github.com/${{ github.repository }}" `
              --token $env:GH_TOKEN `
              --outputDir artifacts/release `
              --tag $env:RELEASE_TAG `
              --releaseName "BatteryMonitor $env:RELEASE_VERSION" `
              --publish

          gh release view $env:RELEASE_TAG --json isDraft,isPrerelease,tagName,assets
